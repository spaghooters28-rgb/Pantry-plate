openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Meal Planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and account management
  - name: meals
    description: Meal suggestions and management
  - name: grocery
    description: Grocery list management
  - name: pantry
    description: Pantry item tracking
  - name: schedule
    description: Scheduled recurring grocery items
  - name: weekly
    description: Weekly meal plans
  - name: preferences
    description: User preferences
  - name: history
    description: Recipe history tracking
  - name: pins
    description: Cooking Board pinned items
  - name: openai
    description: OpenAI AI chat operations
  - name: billing
    description: Subscription billing and Stripe integration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create a new account with email, display name, and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Created user session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Email already taken

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset email (always returns success to avoid enumeration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Reset email sent (or silently skipped if email not found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Set a new password using a reset token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid, expired, or already-used token

  /auth/password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: Change password for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Current password incorrect or not authenticated

  # ── MEALS ─────────────────────────────────────────────────────────────────

  /meals:
    get:
      operationId: listMeals
      tags: [meals]
      summary: List meal suggestions with optional filters
      parameters:
        - name: cuisine
          in: query
          schema:
            type: string
          description: Filter by cuisine type (e.g. Italian, Mexican, Asian)
        - name: protein
          in: query
          schema:
            type: string
          description: Filter by protein (e.g. chicken, beef, tofu)
        - name: glutenFree
          in: query
          schema:
            type: boolean
        - name: side
          in: query
          schema:
            type: string
          description: Filter by side dish type
      responses:
        "200":
          description: List of meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"

  /meals/{id}:
    get:
      operationId: getMeal
      tags: [meals]
      summary: Get a single meal with full ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"

  /meals/cuisines:
    get:
      operationId: listCuisines
      tags: [meals]
      summary: List all available cuisine categories
      responses:
        "200":
          description: List of cuisine names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /meals/proteins:
    get:
      operationId: listProteins
      tags: [meals]
      summary: List all available protein options
      responses:
        "200":
          description: List of protein options
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /meals/generate-ai:
    post:
      operationId: generateAiMeals
      tags: [meals]
      summary: Use AI to generate and save new meal ideas based on filters
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAiMealsBody"
      responses:
        "200":
          description: Newly generated meals saved to the database
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"

  /meals/{id}/toggle-favorite:
    post:
      operationId: toggleMealFavorite
      tags: [meals]
      summary: Toggle favorite status of a meal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated meal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"

  /meals/analyze-recipe:
    post:
      operationId: analyzeRecipeUrl
      tags: [meals]
      summary: Analyze a recipe URL with AI and extract ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRecipeBody"
      responses:
        "200":
          description: Extracted ingredients with pantry availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeRecipeResult"

  /meals/save-recipe:
    post:
      operationId: saveAnalyzedRecipe
      tags: [meals]
      summary: Save an analyzed recipe as a meal and optionally assign to a weekly plan day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveRecipeBody"
      responses:
        "201":
          description: Saved meal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"

  /meals/custom:
    post:
      operationId: createCustomMeal
      tags: [meals]
      summary: Create a custom recipe scoped to the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomMealBody"
      responses:
        "201":
          description: Created meal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"

  # ── HISTORY ────────────────────────────────────────────────────────────────

  /history:
    get:
      operationId: listRecipeHistory
      tags: [history]
      summary: List all recipes that have been added to the grocery list
      responses:
        "200":
          description: Recipe history entries, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeHistoryEntry"

  /history/{id}:
    delete:
      operationId: deleteRecipeHistory
      tags: [history]
      summary: Remove a recipe from history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /meals/sides:
    get:
      operationId: listSides
      tags: [meals]
      summary: List all available side dish options
      responses:
        "200":
          description: List of side options
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── PREFERENCES ────────────────────────────────────────────────────────────

  /preferences/weekly-plan:
    get:
      operationId: getWeeklyPlanPreferences
      tags: [preferences]
      summary: Get weekly meal plan generation preferences
      responses:
        "200":
          description: Weekly plan preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlanPreferences"
    put:
      operationId: saveWeeklyPlanPreferences
      tags: [preferences]
      summary: Save weekly meal plan generation preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyPlanPreferences"
      responses:
        "200":
          description: Saved preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlanPreferences"

  # ── WEEKLY PLAN ────────────────────────────────────────────────────────────

  /weekly-plan:
    get:
      operationId: getWeeklyPlan
      tags: [weekly]
      summary: Get the current weekly meal plan
      responses:
        "200":
          description: Weekly plan with 7 days of meals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"

    post:
      operationId: generateWeeklyPlan
      tags: [weekly]
      summary: Generate a new weekly meal plan (refreshed suggestions)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateWeeklyPlanBody"
      responses:
        "200":
          description: Newly generated weekly plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"

  /weekly-plan/add-to-grocery:
    post:
      operationId: addWeekToGroceryList
      tags: [weekly]
      summary: Add all meals from the current weekly plan to the grocery list
      responses:
        "200":
          description: Result of adding all week meals
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: integer
                  mealsProcessed:
                    type: integer
                required: [added, mealsProcessed]

  /weekly-plan/days/{day}/meal:
    put:
      operationId: updateDayMeal
      tags: [weekly]
      summary: Assign a meal to a specific day
      parameters:
        - name: day
          in: path
          required: true
          schema:
            type: string
          description: Day of the week (monday, tuesday, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDayMealBody"
      responses:
        "200":
          description: Updated day entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlanDay"

  # ── GROCERY LIST ──────────────────────────────────────────────────────────

  /grocery-list:
    get:
      operationId: getGroceryList
      tags: [grocery]
      summary: Get the current grocery list (recipe items + custom items)
      responses:
        "200":
          description: Grocery list grouped by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryList"

  /grocery-list/items:
    post:
      operationId: addGroceryItem
      tags: [grocery]
      summary: Add a custom item to the grocery list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddGroceryItemBody"
      responses:
        "201":
          description: Created grocery item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryItem"

  /grocery-list/items/{id}:
    patch:
      operationId: updateGroceryItem
      tags: [grocery]
      summary: Update a grocery item (check off, update quantity, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroceryItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryItem"

    delete:
      operationId: deleteGroceryItem
      tags: [grocery]
      summary: Remove an item from the grocery list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /grocery-list/from-meal/{mealId}:
    post:
      operationId: addMealToGroceryList
      tags: [grocery]
      summary: Add all ingredients for a meal to the grocery list (triggers pantry check)
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Items added along with pantry prompts for ingredients the user may have
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddMealResult"

  /grocery-list/all:
    delete:
      operationId: clearAllGroceryItems
      tags: [grocery]
      summary: Delete every item from the grocery list
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required: [deleted]

  /grocery-list/clear:
    post:
      operationId: clearGroceryList
      tags: [grocery]
      summary: Clear all checked-off items from the list
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryList"

  /grocery-list/suggestions:
    get:
      operationId: getGroceryListSuggestions
      tags: [grocery]
      summary: Get smart grocery suggestions based on pantry state and recent meals
      responses:
        "200":
          description: Suggested items to add
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrocerySuggestion"

  /pantry/all:
    delete:
      operationId: clearAllPantryItems
      tags: [pantry]
      summary: Delete every item from the pantry
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required: [deleted]

  # ── PANTRY ─────────────────────────────────────────────────────────────────

  /pantry:
    get:
      operationId: listPantryItems
      tags: [pantry]
      summary: Get all pantry items
      responses:
        "200":
          description: Pantry items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PantryItem"

  /pantry/items:
    post:
      operationId: addPantryItem
      tags: [pantry]
      summary: Add or update an item in the pantry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPantryItemBody"
      responses:
        "201":
          description: Created or updated pantry item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PantryItem"

  /pantry/items/{id}:
    patch:
      operationId: updatePantryItem
      tags: [pantry]
      summary: Update pantry item (mark as depleted, update quantity)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePantryItemBody"
      responses:
        "200":
          description: Updated pantry item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PantryItem"

    delete:
      operationId: deletePantryItem
      tags: [pantry]
      summary: Remove item from pantry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /pantry/items/{id}/to-grocery:
    post:
      operationId: movePantryItemToGrocery
      tags: [pantry]
      summary: Add a pantry item to the grocery list then optionally remove from pantry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovePantryToGroceryBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /pantry/available-recipes:
    get:
      operationId: getAvailableRecipes
      tags: [pantry]
      summary: Find recipes that can be made from current pantry stock
      responses:
        "200":
          description: Recipes with pantry match information
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableRecipe"

  /pantry/check:
    post:
      operationId: checkPantryForMeal
      tags: [pantry]
      summary: Check which ingredients for a meal are already in pantry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckPantryBody"
      responses:
        "200":
          description: Pantry check result with have/need lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PantryCheckResult"

  # ── SCHEDULED ITEMS ───────────────────────────────────────────────────────

  /scheduled-items:
    get:
      operationId: listScheduledItems
      tags: [schedule]
      summary: List all scheduled recurring grocery items
      responses:
        "200":
          description: Scheduled items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledItem"

    post:
      operationId: createScheduledItem
      tags: [schedule]
      summary: Create a recurring scheduled grocery item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduledItemBody"
      responses:
        "201":
          description: Created scheduled item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledItem"

  /scheduled-items/{id}:
    patch:
      operationId: updateScheduledItem
      tags: [schedule]
      summary: Update a scheduled item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduledItemBody"
      responses:
        "200":
          description: Updated scheduled item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledItem"

    delete:
      operationId: deleteScheduledItem
      tags: [schedule]
      summary: Delete a scheduled item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /scheduled-items/due-today:
    get:
      operationId: getDueScheduledItems
      tags: [schedule]
      summary: Get all scheduled items that are due to be added today
      responses:
        "200":
          description: Due items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledItem"

  # ── COOKING BOARD PINS ─────────────────────────────────────────────────────

  /pins:
    get:
      operationId: getPins
      tags: [pins]
      summary: Get all pinned items for the current user
      responses:
        "200":
          description: Pinned recipe and meal IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinnedItems"

    post:
      operationId: addPin
      tags: [pins]
      summary: Pin an item to the Cooking Board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPinBody"
      responses:
        "201":
          description: Updated pinned items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinnedItems"

  /pins/sync:
    post:
      operationId: syncPins
      tags: [pins]
      summary: Bulk-sync pinned items (used for one-time localStorage migration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinnedItems"
      responses:
        "200":
          description: Current pinned items after sync
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinnedItems"

  /pins/{itemType}/{itemId}:
    delete:
      operationId: removePin
      tags: [pins]
      summary: Remove a pin from the Cooking Board
      parameters:
        - name: itemType
          in: path
          required: true
          schema:
            type: string
          description: "recipe or meal"
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ── OPENAI CHAT ────────────────────────────────────────────────────────────

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  # ── BILLING ────────────────────────────────────────────────────────────────

  /billing/checkout:
    post:
      operationId: startCheckout
      tags: [billing]
      summary: Create a Stripe Checkout session for a subscription tier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartCheckoutBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "503":
          description: Stripe not configured

  /billing/portal:
    post:
      operationId: openBillingPortal
      tags: [billing]
      summary: Create a Stripe Billing Portal session for the current subscriber
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "400":
          description: No active subscription

  /billing/usage:
    get:
      operationId: getAiUsage
      tags: [billing]
      summary: Get current month AI request usage for the authenticated user
      responses:
        "200":
          description: AI usage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiUsageResult"

components:
  schemas:
    # ── AUTH ────────────────────────────────────────────────────────────────

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        displayName:
          type: string
        tier:
          type: string
          description: "Subscription tier: free | pro | pro_ai"
      required: [id, email, displayName, tier]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        password:
          type: string
          minLength: 6
      required: [email, displayName, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    ForgotPasswordBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    ResetPasswordBody:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 6
      required: [token, password]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
      required: [currentPassword, newPassword]

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── MEAL ────────────────────────────────────────────────────────────────

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
        category:
          type: string
          description: "produce, dairy, meat, pantry, etc."
        isCommonPantryItem:
          type: boolean
          description: Common spices/staples likely already in pantry
      required: [id, name, quantity, unit, category, isCommonPantryItem]

    Side:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
      required: [id, name, description]

    AvailableRecipe:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        cuisine:
          type: string
        protein:
          type: string
        isGlutenFree:
          type: boolean
        cookTimeMinutes:
          type: integer
        servings:
          type: integer
        calories:
          type: integer
        imageUrl:
          type: string
          nullable: true
        isFavorited:
          type: boolean
        instructions:
          type: string
          nullable: true
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/Ingredient"
        availableSides:
          type: array
          items:
            $ref: "#/components/schemas/Side"
        tags:
          type: array
          items:
            type: string
        matchScore:
          type: number
          description: Fraction of non-common ingredients covered by pantry (0–1)
        missingIngredients:
          type: array
          items:
            type: string
          description: Names of ingredients not in pantry
      required:
        [
          id,
          name,
          description,
          cuisine,
          protein,
          isGlutenFree,
          cookTimeMinutes,
          servings,
          calories,
          isFavorited,
          ingredients,
          availableSides,
          tags,
          matchScore,
          missingIngredients,
        ]

    Meal:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        cuisine:
          type: string
        protein:
          type: string
        isGlutenFree:
          type: boolean
        cookTimeMinutes:
          type: integer
        servings:
          type: integer
        calories:
          type: integer
        imageUrl:
          type: string
          nullable: true
        isFavorited:
          type: boolean
        instructions:
          type: string
          nullable: true
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/Ingredient"
        availableSides:
          type: array
          items:
            $ref: "#/components/schemas/Side"
        tags:
          type: array
          items:
            type: string
      required:
        [
          id,
          name,
          description,
          cuisine,
          protein,
          isGlutenFree,
          cookTimeMinutes,
          servings,
          calories,
          isFavorited,
          ingredients,
          availableSides,
          tags,
        ]

    # ── WEEKLY PLAN ─────────────────────────────────────────────────────────

    WeeklyPlanDay:
      type: object
      properties:
        day:
          type: string
        meal:
          $ref: "#/components/schemas/Meal"
          nullable: true
        selectedSideId:
          type: integer
          nullable: true
      required: [day]

    WeeklyPlan:
      type: object
      properties:
        id:
          type: integer
        weekStartDate:
          type: string
          format: date
        days:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyPlanDay"
        generatedAt:
          type: string
          format: date-time
      required: [id, weekStartDate, days, generatedAt]

    GenerateWeeklyPlanBody:
      type: object
      properties:
        cuisine:
          type: string
          nullable: true
        glutenFree:
          type: boolean
          nullable: true
        proteins:
          type: array
          items:
            type: string

    UpdateDayMealBody:
      type: object
      properties:
        mealId:
          type: integer
          nullable: true
        selectedSideId:
          type: integer
          nullable: true
      required: []

    # ── GROCERY ─────────────────────────────────────────────────────────────

    GroceryItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
          nullable: true
        category:
          type: string
        isChecked:
          type: boolean
        isCustom:
          type: boolean
          description: True if manually added by user, not from a recipe
        mealId:
          type: integer
          nullable: true
          description: Source meal if from a recipe
        mealName:
          type: string
          nullable: true
        addedAt:
          type: string
          format: date-time
      required:
        [id, name, quantity, category, isChecked, isCustom, addedAt]

    GroceryCategory:
      type: object
      properties:
        category:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroceryItem"
      required: [category, items]

    GroceryList:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/GroceryCategory"
        totalItems:
          type: integer
        checkedItems:
          type: integer
      required: [categories, totalItems, checkedItems]

    AddGroceryItemBody:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
          nullable: true
        category:
          type: string
        scheduleType:
          type: string
          nullable: true
          description: "none | weekly | biweekly | every_other_day | custom"
        scheduleDaysInterval:
          type: integer
          nullable: true
          description: If custom schedule, number of days between additions
      required: [name, quantity, category]

    UpdateGroceryItemBody:
      type: object
      properties:
        isChecked:
          type: boolean
          nullable: true
        quantity:
          type: string
          nullable: true
        name:
          type: string
          nullable: true

    AddMealResult:
      type: object
      properties:
        addedItems:
          type: array
          items:
            $ref: "#/components/schemas/GroceryItem"
        pantryPrompts:
          type: array
          items:
            $ref: "#/components/schemas/PantryPrompt"
      required: [addedItems, pantryPrompts]

    PantryPrompt:
      type: object
      properties:
        pantryItemId:
          type: integer
        ingredientName:
          type: string
        question:
          type: string
          description: "Do you still have oregano?"
        groceryItemId:
          type: integer
          description: The grocery item that was added (can be removed if user confirms they have it)
      required: [pantryItemId, ingredientName, question, groceryItemId]

    GrocerySuggestion:
      type: object
      properties:
        name:
          type: string
        reason:
          type: string
          description: Why this is being suggested
        category:
          type: string
        frequency:
          type: string
          description: "How often this item has been purchased"
      required: [name, reason, category, frequency]

    # ── PANTRY ──────────────────────────────────────────────────────────────

    PantryItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: string
          nullable: true
        category:
          type: string
        inStock:
          type: boolean
        lastVerifiedAt:
          type: string
          format: date-time
          nullable: true
        usedInMeals:
          type: array
          items:
            type: string
          description: Meal names that use this ingredient
        notes:
          type: string
          nullable: true
      required: [id, name, category, inStock, usedInMeals]

    AddPantryItemBody:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: string
          nullable: true
        category:
          type: string
        notes:
          type: string
          nullable: true
      required: [name, category]

    UpdatePantryItemBody:
      type: object
      properties:
        inStock:
          type: boolean
          nullable: true
        quantity:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        lastVerifiedAt:
          type: string
          format: date-time
          nullable: true

    GenerateAiMealsBody:
      type: object
      properties:
        cuisine:
          type: string
          nullable: true
          description: Filter cuisine for AI suggestions (e.g. Italian, Mexican)
        protein:
          type: string
          nullable: true
          description: Filter protein type for AI suggestions
        glutenFree:
          type: boolean
          nullable: true
          description: If true, only generate gluten-free meal ideas
        count:
          type: integer
          nullable: true
          description: Number of meals to generate (default 10)

    CheckPantryBody:
      type: object
      properties:
        mealId:
          type: integer
      required: [mealId]

    PantryCheckResult:
      type: object
      properties:
        haveInPantry:
          type: array
          items:
            $ref: "#/components/schemas/PantryItem"
        needToBuy:
          type: array
          items:
            $ref: "#/components/schemas/Ingredient"
      required: [haveInPantry, needToBuy]

    # ── SCHEDULED ──────────────────────────────────────────────────────────

    ScheduledItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
          nullable: true
        category:
          type: string
        scheduleType:
          type: string
          description: "weekly | biweekly | every_other_day | custom"
        scheduleDaysInterval:
          type: integer
          nullable: true
        nextDueDate:
          type: string
          format: date
        lastAddedDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
      required:
        [
          id,
          name,
          quantity,
          category,
          scheduleType,
          nextDueDate,
          isActive,
        ]

    CreateScheduledItemBody:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
          nullable: true
        category:
          type: string
        scheduleType:
          type: string
          description: "weekly | biweekly | every_other_day | custom"
        scheduleDaysInterval:
          type: integer
          nullable: true
          description: Required if scheduleType is 'custom'
      required: [name, quantity, category, scheduleType]

    MovePantryToGroceryBody:
      type: object
      properties:
        removeFromPantry:
          type: boolean
          description: If true, delete item from pantry after adding to grocery
      required: [removeFromPantry]

    WeeklyPlanPreferences:
      type: object
      properties:
        cuisine:
          type: string
          nullable: true
        proteins:
          type: array
          items:
            type: string
        glutenFree:
          type: boolean
          nullable: true
        activeDays:
          type: array
          items:
            type: string
          description: Days of week to plan meals for (e.g. ["monday","wednesday","friday"]). If empty, all 7 days.

    AnalyzeRecipeBody:
      type: object
      properties:
        url:
          type: string
          description: URL of the recipe page to analyze
      required: [url]

    RecipeIngredient:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
          nullable: true
        category:
          type: string
        inPantry:
          type: boolean
          description: Whether this ingredient is already in the pantry
      required: [name, quantity, category, inPantry]

    AnalyzeRecipeResult:
      type: object
      properties:
        recipeName:
          type: string
        cuisine:
          type: string
          nullable: true
        protein:
          type: string
          nullable: true
        isGlutenFree:
          type: boolean
          nullable: true
        cookTimeMinutes:
          type: integer
          nullable: true
        calories:
          type: integer
          nullable: true
        servings:
          type: integer
          nullable: true
        instructions:
          type: string
          nullable: true
          description: Full recipe instructions extracted from the page
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"
        haveCount:
          type: integer
        needCount:
          type: integer
      required: [recipeName, ingredients, haveCount, needCount]

    SaveRecipeBody:
      type: object
      properties:
        recipeName:
          type: string
        cuisine:
          type: string
          nullable: true
        protein:
          type: string
          nullable: true
        isGlutenFree:
          type: boolean
          nullable: true
        cookTimeMinutes:
          type: integer
          nullable: true
        calories:
          type: integer
          nullable: true
        instructions:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        assignToDay:
          type: string
          nullable: true
          description: Day of week to assign to (e.g. "monday"). Optional.
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"
      required: [recipeName, ingredients]

    CustomIngredientInput:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
        category:
          type: string
      required: [name]

    CreateCustomMealBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        cuisine:
          type: string
        protein:
          type: string
        isGlutenFree:
          type: boolean
        cookTimeMinutes:
          type: integer
        servings:
          type: integer
        calories:
          type: integer
        instructions:
          type: string
          nullable: true
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/CustomIngredientInput"
      required: [name]

    # ── PINS ────────────────────────────────────────────────────────────────

    PinnedItems:
      type: object
      properties:
        recipeIds:
          type: array
          items:
            type: integer
          description: History entry IDs pinned to the Cooking Board
        mealIds:
          type: array
          items:
            type: integer
          description: Meal IDs pinned to the Cooking Board
      required: [recipeIds, mealIds]

    AddPinBody:
      type: object
      properties:
        itemType:
          type: string
          description: "recipe or meal"
        itemId:
          type: integer
      required: [itemType, itemId]

    RecipeHistoryEntry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        cuisine:
          type: string
        protein:
          type: string
        isGlutenFree:
          type: boolean
        cookTimeMinutes:
          type: integer
        calories:
          type: integer
        instructions:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        mealId:
          type: integer
          nullable: true
        addedAt:
          type: string
          format: date-time
      required: [id, name, cuisine, protein, isGlutenFree, cookTimeMinutes, calories, addedAt]

    UpdateScheduledItemBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
        quantity:
          type: string
          nullable: true
        scheduleType:
          type: string
          nullable: true
        scheduleDaysInterval:
          type: integer
          nullable: true
        isActive:
          type: boolean
          nullable: true
        nextDueDate:
          type: string
          format: date
          nullable: true

    # ── BILLING ─────────────────────────────────────────────────────────────

    StartCheckoutBody:
      type: object
      properties:
        tier:
          type: string
          description: "pro | pro_ai"
      required: [tier]

    CheckoutResult:
      type: object
      properties:
        url:
          type: string
          description: Stripe-hosted redirect URL
      required: [url]

    AiUsageResult:
      type: object
      properties:
        used:
          type: integer
          description: Number of AI requests used this month
        cap:
          type: integer
          description: Monthly cap for this tier
        yearMonth:
          type: string
          description: "YYYY-MM of the current billing period"
      required: [used, cap, yearMonth]
